<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Painel ESP32 LED</title>
  <style>
    :root {
      --bg-1: #0a2a43;
      --bg-2: #0e5e6f;
      --card: #f7fbfc;
      --text: #1b2430;
      --muted: #4a5a6a;
      --ok: #0a8f5b;
      --warn: #b45309;
      --err: #b42318;
      --accent: #0f766e;
      --accent-2: #155e75;
      --shadow: 0 18px 45px rgba(8, 22, 34, 0.32);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      color: var(--text);
      font-family: "Trebuchet MS", "Segoe UI", sans-serif;
      background:
        radial-gradient(circle at 10% 20%, rgba(255, 255, 255, 0.15), transparent 45%),
        radial-gradient(circle at 90% 10%, rgba(255, 255, 255, 0.12), transparent 35%),
        linear-gradient(130deg, var(--bg-1), var(--bg-2));
      display: grid;
      place-items: center;
      padding: 18px;
    }

    .panel {
      width: min(700px, 100%);
      background: var(--card);
      border-radius: 20px;
      box-shadow: var(--shadow);
      overflow: hidden;
      animation: rise 420ms ease-out;
    }

    .hero {
      background: linear-gradient(120deg, #0f766e, #155e75);
      color: #f3fbfc;
      padding: 22px;
    }

    .hero h1 {
      margin: 0;
      font-size: clamp(1.4rem, 2.3vw, 2rem);
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    .hero p {
      margin: 8px 0 0;
      opacity: 0.92;
      font-size: 0.96rem;
    }

    .content {
      padding: 18px;
      display: grid;
      gap: 14px;
    }

    .row {
      display: grid;
      grid-template-columns: 1fr;
      gap: 8px;
    }

    label {
      font-weight: 700;
      font-size: 0.9rem;
      color: var(--muted);
    }

    input {
      width: 100%;
      border: 1px solid #c7d5dc;
      border-radius: 12px;
      padding: 12px;
      font-size: 1rem;
      outline: none;
      transition: border-color 120ms ease, box-shadow 120ms ease;
    }

    input:focus {
      border-color: #0f766e;
      box-shadow: 0 0 0 4px rgba(15, 118, 110, 0.16);
    }

    .actions {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 10px;
    }

    button {
      border: 0;
      border-radius: 12px;
      padding: 12px 10px;
      font-weight: 700;
      color: #ffffff;
      background: #0f766e;
      cursor: pointer;
      transition: transform 110ms ease, filter 110ms ease;
    }

    button:nth-child(2) {
      background: #1d4ed8;
    }

    button:nth-child(3) {
      background: #b45309;
    }

    button:nth-child(4) {
      background: #6d28d9;
    }

    button:hover {
      filter: brightness(1.06);
    }

    button:active {
      transform: translateY(1px) scale(0.995);
    }

    .status {
      border: 1px solid #d3e0e6;
      border-radius: 12px;
      padding: 12px;
      min-height: 52px;
      background: #fcfeff;
      font-size: 0.96rem;
      line-height: 1.35;
    }

    .status.ok {
      border-color: rgba(10, 143, 91, 0.35);
      color: var(--ok);
    }

    .status.warn {
      border-color: rgba(180, 83, 9, 0.35);
      color: var(--warn);
    }

    .status.err {
      border-color: rgba(180, 35, 24, 0.35);
      color: var(--err);
    }

    .tip {
      color: var(--muted);
      font-size: 0.85rem;
    }

    @keyframes rise {
      from {
        opacity: 0;
        transform: translateY(12px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @media (max-width: 640px) {
      .actions {
        grid-template-columns: 1fr;
      }

      .hero {
        padding: 18px;
      }
    }
  </style>
</head>
<body>
  <main class="panel">
    <section class="hero">
      <h1>Painel ESP32 LED</h1>
      <p>Frontend HTML para controlar o backend Python</p>
    </section>

    <section class="content">
      <div class="row">
        <label for="backendUrl">URL do backend Python</label>
        <input id="backendUrl" type="text" value="http://127.0.0.1:5000" placeholder="http://127.0.0.1:5000" />
      </div>

      <div class="actions">
        <button data-endpoint="/api/led/on">Ligar LED</button>
        <button data-endpoint="/api/led/off">Desligar LED</button>
        <button data-endpoint="/api/led/blink">Piscar LED</button>
        <button data-endpoint="/semafaro">Semafaro</button>
      </div>

      <div id="status" class="status">Pronto para enviar comandos.</div>
      <div class="tip">Espera endpoints no backend: /api/led/on, /api/led/off, /api/led/blink, /semafaro.</div>
    </section>
  </main>

  <script>
    const statusEl = document.getElementById("status");
    const backendUrlEl = document.getElementById("backendUrl");
    const buttons = Array.from(document.querySelectorAll("button[data-endpoint]"));

    function setStatus(message, kind = "") {
      statusEl.textContent = message;
      statusEl.className = "status" + (kind ? " " + kind : "");
    }

    function normalizeBaseUrl(value) {
      return value.trim().replace(/\/$/, "");
    }

    async function sendCommand(endpoint) {
      const baseUrl = normalizeBaseUrl(backendUrlEl.value);

      if (!baseUrl) {
        setStatus("Informe a URL do backend Python.", "warn");
        return;
      }

      setStatus("Enviando comando...", "warn");
      buttons.forEach((btn) => (btn.disabled = true));

      try {
        const response = await fetch(baseUrl + endpoint, {
          method: "POST",
          headers: { "Content-Type": "application/json" }
        });

        const contentType = response.headers.get("content-type") || "";
        const body = contentType.includes("application/json")
          ? await response.json()
          : { message: await response.text() };

        if (!response.ok) {
          const message = body.message || "Falha ao executar comando.";
          setStatus("Erro: " + message, "err");
          return;
        }

        const message = body.message || "Comando executado com sucesso.";
        setStatus("OK: " + message, "ok");
      } catch (error) {
        setStatus("Erro de conexao com o backend.", "err");
      } finally {
        buttons.forEach((btn) => (btn.disabled = false));
      }
    }

    buttons.forEach((btn) => {
      btn.addEventListener("click", () => {
        sendCommand(btn.dataset.endpoint);
      });
    });
  </script>
</body>
</html>
